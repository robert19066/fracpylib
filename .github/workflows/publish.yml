name: Publish
# v1
on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Hatch publish
    runs-on: ubuntu-latest
    steps:
      - name: ---checking repo---
        uses: actions/checkout@v4

      - name: ---init python---
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ---installing hatch---
        run: python -m pip install --upgrade pip hatch

      - name: ---verify files---
        shell: bash
        run: |
          test -f pyproject.toml
          test -f README.md
          test -f LICENSE.txt
          test -f src/fracpylib/__about__.py
          test -d tests

      - name: ---run tests---
        run: hatch run test

      - name: ---verify PyPI token---
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        shell: bash
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error title=Missing PYPI_API_TOKEN::Add a repository secret named PYPI_API_TOKEN before publishing."
            exit 1
          fi

      - name: ---publish package---
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_NON_INTERACTIVE: "1"
        run: hatch run publish
